server.port=8080

# Disable H2 console in production
spring.h2.console.enabled=false

# PostgreSQL / Supabase — session-mode pooler (port 6543, not 5432)
# Session mode holds a real persistent connection, which Hibernate requires for ddl-auto=update
spring.datasource.url=jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres.wuarcbmddngqzuzveoka
spring.datasource.password=SoPra-Group32

# Keep pool small — Supabase free tier limits concurrent connections
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=60000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
